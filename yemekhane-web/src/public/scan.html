<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yemekhane Takip — Tarama</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="scan-page">
  <div id="sessionPickerOverlay" class="session-picker-overlay">
    <div class="session-picker-card">
      <h2>Bu Oturum Hangi Yemek Türü İçin?</h2>
      <p>Tarama başlamadan önce bir yemek türü seçin.</p>
      <div id="sessionMealButtons" class="session-meal-buttons"></div>
    </div>
  </div>

  <!-- Üst Bar -->
  <header class="scan-header">
    <div class="header-left">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M3 11l19-9-9 19-2-8-8-2z"/>
      </svg>
      <span>Yemekhane Takip</span>
    </div>
    <div class="header-right">
      <span id="scanAppVersion" class="header-version" title=""></span>
      <button id="settingsToggleBtn" class="btn-secondary hidden">Ayarlar</button>
      <span id="sessionMealChip" class="header-version">Oturum: Seçilmedi</span>
      <span id="userInfo" class="user-info"></span>
      <button id="logoutBtn" class="btn-logout">Çıkış</button>
    </div>
  </header>

  <!-- Ana İçerik -->
  <main class="scan-main">

    <!-- Sol Panel: Profil / Son Okutulan -->
    <div class="camera-panel">
      <div class="panel-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4"/>
          <path d="M5 20c1.8-3.2 4.3-4.8 7-4.8S17.2 16.8 19 20"/>
        </svg>
        Son Okutulan Personel
      </div>

      <!-- Yemek Tipi Seçici -->
      <div class="meal-selector">
        <label for="mealTypeSelect">Yemek Tipi</label>
        <select id="mealTypeSelect" disabled>
          <option value="">Yükleniyor...</option>
        </select>
      </div>

      <!-- Profil Önizleme -->
      <div class="camera-wrapper profile-wrapper">
        <img id="staffPhotoPreview" class="staff-photo-preview hidden" alt="Personel fotoğrafı" />
        <div id="staffPhotoPlaceholder" class="camera-placeholder">
          <span>Profil resmi yok</span>
        </div>
      </div>
    </div>

    <!-- Sağ Panel: Sonuç -->
    <div class="right-panel">
      <div class="manual-panel">
        <div class="panel-title">Operatör İşlemleri</div>
        <div class="operator-actions">
          <button id="cancelLastBtn" class="btn-secondary btn-touch">Son İşlemi İptal Et</button>
          <button id="openDisplayBtn" class="btn-secondary btn-touch">Karşı Ekranı Aç</button>
        </div>
      </div>

      <div class="manual-panel">
        <div class="panel-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M8 7h10M8 12h10M8 17h10"/>
            <circle cx="4" cy="7" r="1.4"/>
            <circle cx="4" cy="12" r="1.4"/>
            <circle cx="4" cy="17" r="1.4"/>
          </svg>
          Tüm Okutmalar (Oturum)
        </div>
        <ul id="scanHistoryList" class="scan-history-list"></ul>
      </div>

      <!-- İstatistik -->
      <div class="stats-panel">
        <div class="stat-item">
          <span class="stat-label">Bugün Toplam</span>
          <span class="stat-value" id="statToday">—</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Son Tarama</span>
          <span class="stat-value" id="statLastScan">—</span>
        </div>
      </div>

      <section id="settingsPanel" class="manual-panel hidden">
        <div class="panel-title">Panel Ayarları</div>
        <div class="settings-grid">
          <label>Genel Sistem <input id="set_system_name" type="text" /></label>
          <label>Geçiş Kuralları (Aylık Kota) <input id="set_monthly_quota" type="number" min="1" /></label>
          <label>Geçiş Cooldown (dk) <input id="set_scan_cooldown_minutes" type="number" min="0" /></label>
          <label>Kimlik/Barkod Formatları <input id="set_allowed_barcode_formats" type="text" /></label>
          <label>Yetki/Güvenlik (Login deneme) <input id="set_login_max_attempts" type="number" min="3" /></label>
          <label>Offline Kuyruk Limiti <input id="set_offline_queue_max_size" type="number" min="100" /></label>
          <label>Cihaz Modu
            <select id="set_scanner_input_mode">
              <option value="camera">camera</option>
              <option value="keyboard">keyboard</option>
              <option value="serial">serial</option>
              <option value="network">network</option>
            </select>
          </label>
          <label>Raporlama (varsayılan gün) <input id="set_report_default_range_days" type="number" min="1" /></label>
          <label>Metrik Aktif
            <select id="set_enable_metrics">
              <option value="true">Açık</option>
              <option value="false">Kapalı</option>
            </select>
          </label>
        </div>
        <div class="settings-actions">
          <button id="saveSettingsBtn" class="btn-primary">Ayarları Kaydet</button>
          <button id="resetSessionBtn" type="button" class="btn-secondary">Tarama Oturumunu Sıfırla</button>
        </div>
      </section>

    </div>
  </main>

  <!-- Tam Ekran Sonuç Overlay -->
  <div id="resultOverlay" class="result-overlay hidden">
    <div class="overlay-card" id="overlayCard">
      <div class="overlay-icon" id="overlayIcon"></div>
      <div class="overlay-name" id="overlayName"></div>
      <div class="overlay-dept" id="overlayDept"></div>
      <div class="overlay-meal" id="overlayMeal"></div>
      <div class="overlay-quota" id="overlayQuota"></div>
      <div class="overlay-message" id="overlayMessage"></div>
      <button class="overlay-close" id="overlayClose">Kapat</button>
      <div class="overlay-countdown" id="overlayCountdown"></div>
    </div>
  </div>

  <script src="/scanner-adapters.js"></script>
  <script src="/app.js"></script>
</body>
</html>
